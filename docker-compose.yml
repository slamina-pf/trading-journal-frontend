version: "3.9"

services:
  frontend:
    build:
      context: .
      target: dev
    container_name: trading_journal_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - trading_journal_net

networks:
  trading_journal_net:
    external: true
    name: trading_journal_net
